run:
  timeout: 5m
  issues-exit-code: 1

linters:
  enable:
    - gofmt
    - goimports
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - typecheck
    - gosimple
    - goconst
    - gocyclo
    - dupl
    - misspell
    - unconvert
    - prealloc
    - revive
    - gosec
    - bodyclose
    - noctx
    - exportloopref

linters-settings:
  gocyclo:
    min-complexity: 15
  goconst:
    min-len: 3
    min-occurrences: 3
  dupl:
    threshold: 100
  gosec:
    excludes:
      - G104  # Unhandled errors on deferred Close — acceptable pattern
      - G114  # http.ListenAndServe — we use custom servers with timeouts

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - goconst
        - gosec
        - errcheck
    - path: test/
      linters:
        - gosec
        - errcheck
