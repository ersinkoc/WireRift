name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Build
        run: go build ./cmd/... ./internal/...

      - name: Vet
        run: go vet ./cmd/... ./internal/...

      - name: Unit Tests
        run: go test ./cmd/... ./internal/... ./test/integration/ -timeout 120s

  race:
    name: Race Detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Test with Race Detector
        run: go test -race ./cmd/... ./internal/... ./test/integration/ -timeout 180s

  fuzz:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Fuzz Frame Parser
        run: go test -fuzz=FuzzReadFrame -fuzztime=30s ./internal/proto/

      - name: Fuzz JSON Payload
        run: go test -fuzz=FuzzDecodeJSONPayload -fuzztime=30s ./internal/proto/

      - name: Fuzz Magic Bytes
        run: go test -fuzz=FuzzReadMagic -fuzztime=15s ./internal/proto/

      - name: Fuzz HTTP Response
        run: go test -fuzz=FuzzDeserializeResponse -fuzztime=30s ./internal/server/

      - name: Fuzz Subdomain Extraction
        run: go test -fuzz=FuzzExtractSubdomain -fuzztime=15s ./internal/server/

      - name: Fuzz IP Whitelist
        run: go test -fuzz=FuzzIsIPAllowed -fuzztime=15s ./internal/server/

  advanced:
    name: Advanced Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Security, Stress, Reconnect & Soak Tests
        run: go run ./test/advanced/

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Test with Coverage
        run: go test ./cmd/... ./internal/... -coverprofile=coverage.out -timeout 120s

      - name: Check Coverage Threshold
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${total}%"
          if (( $(echo "$total < 95" | bc -l) )); then
            echo "::error::Coverage ${total}% is below 95% threshold"
            exit 1
          fi
